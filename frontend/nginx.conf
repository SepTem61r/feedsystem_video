server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # proxy API to backend
    location /account {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
    location /video {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
    location /like {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
    location /comment {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
    location /social {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
    location /feed {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
    location /static {
        proxy_pass http://backend:8080;
        proxy_set_header Host $host;
    }
}